<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuracoes - Biblioteca</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .settings-card {
      background: white; border-radius: 18px; padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,.06);
    }
    .settings-card h2 { color: #5a189a; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .settings-card .form-group { margin-bottom: 16px; }
    .settings-card label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
    .settings-card .form-control-static {
      padding: 10px 14px; background: #f5f3fa; border-radius: 10px; color: #666; font-size: 14px;
    }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0edf5; }
    .info-row:last-child { border: none; }
    .info-row .label { color: #888; font-size: 13px; }
    .info-row .value { color: #333; font-weight: bold; font-size: 14px; }
    .my-items { margin-top: 15px; }
    .my-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; background: #faf8ff; border-radius: 10px; margin-bottom: 8px;
    }
    .my-item .tag {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: bold;
    }
    .tag-ativo { background: #fce4ec; color: #c62828; }
    .tag-reservado { background: #f3e5f5; color: #7b1fa2; }
    .danger-zone { border: 2px solid #fce4ec; border-radius: 18px; padding: 25px; margin-top: 25px; }
    .danger-zone h3 { color: #e63946; margin-bottom: 10px; }
    @media (max-width: 768px) { .settings-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="tela%20inicial.html" class="nav-brand"><i class="fa-solid fa-book"></i><span>Biblioteca</span></a>
    <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links">
      <a href="tela%20inicial.html"><i class="fa-solid fa-house"></i> Inicio</a>
      <a href="livros.html"><i class="fa-solid fa-book-open"></i> Livros</a>
      <a href="categorias.html"><i class="fa-solid fa-layer-group"></i> Categorias</a>
      <a href="emprestimos.html"><i class="fa-solid fa-book-bookmark"></i> Catalogo</a>
      <a href="usuarios.html"><i class="fa-solid fa-users"></i> Usuarios</a>
      <a href="reservas.html"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
      <a href="atrasados.html"><i class="fa-solid fa-triangle-exclamation"></i> Atrasados</a>
      <a href="configuracoes.html" class="active"><i class="fa-solid fa-gear"></i> Config</a>
    </ul>
    <div class="nav-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <div class="main-content">
    <div class="settings-grid">
      <!-- MINHA CONTA -->
      <div class="settings-card">
        <h2><i class="fa-solid fa-user"></i> Minha Conta</h2>
        <div class="form-group">
          <label>Nome</label>
          <input class="form-control" id="myNome">
        </div>
        <div class="form-group">
          <label>Matricula</label>
          <div class="form-control-static" id="myMatricula"></div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" id="myEmail" type="email">
        </div>
        <button class="btn btn-primary btn-block" onclick="atualizarPerfil()"><i class="fa-solid fa-floppy-disk"></i> Salvar Alteracoes</button>
        <hr style="margin:20px 0;border:none;border-top:1px solid #eee;">
        <h3 style="color:#5a189a;font-size:15px;margin-bottom:12px;">Alterar Senha</h3>
        <div class="form-group">
          <label>Senha Atual</label>
          <input class="form-control" id="senhaAtual" type="password">
        </div>
        <div class="form-group">
          <label>Nova Senha</label>
          <input class="form-control" id="novaSenha" type="password">
        </div>
        <button class="btn btn-primary btn-block" onclick="alterarSenha()"><i class="fa-solid fa-key"></i> Alterar Senha</button>
      </div>

      <!-- MEUS EMPRESTIMOS / RESERVAS -->
      <div class="settings-card">
        <h2><i class="fa-solid fa-book-bookmark"></i> Meus Emprestimos & Reservas</h2>
        <div id="myItems"><p style="color:#999;">Carregando...</p></div>
      </div>

      <!-- ADMIN - SISTEMA -->
      <div class="settings-card" id="adminCard" style="display:none;">
        <h2><i class="fa-solid fa-gauge-high"></i> Sistema</h2>
        <div id="adminStats"></div>
      </div>

      <!-- ADMIN - TODOS OS EMPRESTIMOS -->
      <div class="settings-card" id="adminEmprestimosCard" style="display:none;">
        <h2><i class="fa-solid fa-list"></i> Todos os Emprestimos</h2>
        <div style="max-height:300px;overflow-y:auto;" id="allEmprestimos"><p style="color:#999;">Carregando...</p></div>
      </div>
    </div>

    <!-- ADMIN - DANGER ZONE -->
    <div class="danger-zone" id="dangerZone" style="display:none;">
      <h3><i class="fa-solid fa-triangle-exclamation"></i> Zona de Perigo</h3>
      <p style="color:#888;font-size:13px;margin-bottom:15px;">Acoes irreversiveis. Apenas para administradores.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-danger" onclick="resetarBanco()"><i class="fa-solid fa-rotate-left"></i> Resetar Banco de Dados</button>
      </div>
    </div>
  </div>

  <script>
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (!usuario.id) { window.location.href = 'bibliotecaa.html'; return; }
    document.getElementById('userName').textContent = usuario.nome;
    const isAdmin = usuario.matricula === 'admin';

    function sair() { sessionStorage.clear(); window.location.href = 'bibliotecaa.html'; }

    // Carregar perfil
    async function carregarPerfil() {
      try {
        const r = await fetch('/api/usuarios');
        const users = await r.json();
        const me = users.find(u => u.id === usuario.id);
        if (!me) return;
        document.getElementById('myNome').value = me.nome;
        document.getElementById('myMatricula').textContent = me.matricula;
        document.getElementById('myEmail').value = me.email || '';
      } catch(e) {}
    }

    // Atualizar perfil
    async function atualizarPerfil() {
      const data = {
        nome: document.getElementById('myNome').value.trim(),
        matricula: usuario.matricula,
        email: document.getElementById('myEmail').value.trim(),
        senha: ''
      };
      if (!data.nome) { alert('Nome nao pode ficar vazio'); return; }
      try {
        const r = await fetch('/api/usuarios/'+usuario.id, {
          method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
        });
        const res = await r.json();
        if (res.success) {
          usuario.nome = data.nome;
          sessionStorage.setItem('usuario', JSON.stringify(usuario));
          document.getElementById('userName').textContent = data.nome;
          alert('Perfil atualizado!');
        } else alert(res.message);
      } catch(e) { alert('Erro ao atualizar'); }
    }

    // Alterar senha
    async function alterarSenha() {
      const senhaAtual = document.getElementById('senhaAtual').value;
      const novaSenha = document.getElementById('novaSenha').value;
      if (!senhaAtual || !novaSenha) { alert('Preencha todos os campos'); return; }
      if (novaSenha.length < 4) { alert('Nova senha deve ter no minimo 4 caracteres'); return; }
      try {
        const r = await fetch('/api/usuarios/'+usuario.id+'/senha', {
          method:'PUT', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({senha_atual: senhaAtual, nova_senha: novaSenha})
        });
        const res = await r.json();
        if (res.success) { alert('Senha alterada!'); document.getElementById('senhaAtual').value = ''; document.getElementById('novaSenha').value = ''; }
        else alert(res.message);
      } catch(e) { alert('Erro'); }
    }

    // Meus emprestimos e reservas
    async function carregarMeusItens() {
      try {
        const r = await fetch('/api/usuarios/'+usuario.id+'/emprestimos');
        const items = await r.json();
        const div = document.getElementById('myItems');
        if (!items.length) { div.innerHTML = '<p style="color:#999;">Nenhum emprestimo ou reserva ativa</p>'; return; }
        div.innerHTML = items.map(i => `
          <div class="my-item">
            <div>
              <strong>${i.livro}</strong> - ${i.autor}<br>
              <small style="color:#999;">${new Date(i.data+'Z').toLocaleDateString('pt-BR')}</small>
            </div>
            <span class="tag tag-${i.tipo}">${i.tipo === 'ativo' ? 'Emprestado' : 'Reservado'}</span>
          </div>
        `).join('');
      } catch(e) { document.getElementById('myItems').innerHTML = '<p style="color:#e63946;">Erro ao carregar</p>'; }
    }

    // Admin - carregar stats
    async function carregarAdmin() {
      if (!isAdmin) return;
      document.getElementById('adminCard').style.display = 'block';
      document.getElementById('adminEmprestimosCard').style.display = 'block';
      document.getElementById('dangerZone').style.display = 'block';
      try {
        const d = await (await fetch('/api/dashboard')).json();
        document.getElementById('adminStats').innerHTML = `
          <div class="info-row"><span class="label">Total Livros</span><span class="value">${d.total_livros}</span></div>
          <div class="info-row"><span class="label">Disponiveis</span><span class="value">${d.disponiveis}</span></div>
          <div class="info-row"><span class="label">Emprestados</span><span class="value">${d.emprestados}</span></div>
          <div class="info-row"><span class="label">Reservados</span><span class="value">${d.reservados}</span></div>
          <div class="info-row"><span class="label">Emprestimos Ativos</span><span class="value">${d.emprestimos_ativos}</span></div>
          <div class="info-row"><span class="label">Total Usuarios</span><span class="value">${d.total_usuarios}</span></div>
          <div class="info-row"><span class="label">Categorias</span><span class="value">${d.total_categorias}</span></div>
        `;
      } catch(e) { document.getElementById('adminStats').innerHTML = '<p style="color:#e63946;">Erro</p>'; }
      try {
        const e = await (await fetch('/api/emprestimos')).json();
        document.getElementById('allEmprestimos').innerHTML = e.length ? e.map(emp => `
          <div class="my-item">
            <div><strong>${emp.livro}</strong> - ${emp.usuario}<br><small style="color:#999;">${new Date(emp.data_emprestimo+'Z').toLocaleDateString('pt-BR')}</small></div>
            <span class="tag tag-${emp.status}">${emp.status === 'ativo' ? 'Ativo' : emp.status === 'reservado' ? 'Reservado' : 'Devolvido'}</span>
          </div>
        `).join('') : '<p style="color:#999;">Nenhum emprestimo</p>';
      } catch(e) { document.getElementById('allEmprestimos').innerHTML = '<p style="color:#e63946;">Erro</p>'; }
    }

    async function resetarBanco() {
      if (!confirm('TEM CERTEZA? Isso vai apagar TODOS os dados e recriar o banco!')) return;
      if (!confirm('ULTIMA CHANCE: Confirme novamente para resetar tudo.')) return;
      try {
        const r = await fetch('/api/resetar', { method:'POST' });
        const res = await r.json();
        if (res.success) { alert('Banco resetado! Faca login novamente.'); sessionStorage.clear(); window.location.href = 'bibliotecaa.html'; }
        else alert(res.message);
      } catch(e) { alert('Erro'); }
    }

    carregarPerfil();
    carregarMeusItens();
    carregarAdmin();
  </script>
</body>
</html>
