<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Biblioteca</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="tela%20inicial.html" class="nav-brand"><i class="fa-solid fa-book"></i><span>Biblioteca</span></a>
    <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links">
      <a href="tela%20inicial.html"><i class="fa-solid fa-house"></i> Inicio</a>
      <a href="livros.html"><i class="fa-solid fa-book-open"></i> Livros</a>
      <a href="categorias.html"><i class="fa-solid fa-layer-group"></i> Categorias</a>
      <a href="emprestimos.html"><i class="fa-solid fa-book-bookmark"></i> Catalogo</a>
      <a href="usuarios.html"><i class="fa-solid fa-users"></i> Usuarios</a>
      <a href="reservas.html" class="active"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
      <a href="atrasados.html"><i class="fa-solid fa-triangle-exclamation"></i> Atrasados</a>
      <a href="configuracoes.html"><i class="fa-solid fa-gear"></i> Config</a>
    </ul>
    <div class="nav-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1><i class="fa-solid fa-calendar-check"></i> Reservas</h1>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr><th>Livro</th><th>Autor</th><th>Reservado por</th><th>Data</th><th>Acao</th></tr>
        </thead>
        <tbody id="reservasTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (usuario.nome) document.getElementById('userName').textContent = usuario.nome;
    function sair() { sessionStorage.clear(); window.location.href = 'bibliotecaa.html'; }

    async function carregar() {
      try {
        const r = await fetch('/api/reservas');
        if (!r.ok) throw Error();
        const reservas = await r.json();
        const tbody = document.getElementById('reservasTable');
        if (!reservas.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#2e7d32;">Nenhuma reserva ativa</td></tr>';
          return;
        }
        tbody.innerHTML = reservas.map(res => `
          <tr>
            <td><strong>${res.livro}</strong></td>
            <td>${res.autor}</td>
            <td>${res.usuario} (${res.matricula})</td>
            <td>${new Date(res.data_reserva+'Z').toLocaleDateString('pt-BR')}</td>
            <td>
              ${usuario.id && (usuario.id === res.usuario_id || usuario.matricula === 'admin')
                ? `<button class="btn btn-sm btn-danger" onclick="cancelarReserva(${res.livro_id})"><i class="fa-solid fa-xmark"></i> Cancelar</button>`
                : `<span class="badge badge-reservado">Reservado</span>`}
            </td>
          </tr>
        `).join('');
      } catch(e) {
        document.getElementById('reservasTable').innerHTML = '<tr><td colspan="5" style="text-align:center;color:#e63946;padding:30px;">Erro ao carregar</td></tr>';
      }
    }

    async function cancelarReserva(livroId) {
      if (!confirm('Cancelar esta reserva?')) return;
      try {
        const r = await fetch('/api/cancelar-reserva', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({livro_id: livroId})
        });
        const d = await r.json();
        if (d.success) { alert(d.message); carregar(); }
        else alert(d.message);
      } catch(e) { alert('Erro'); }
    }

    carregar();
  </script>
</body>
</html>
