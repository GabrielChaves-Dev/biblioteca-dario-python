<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atrasados - Biblioteca</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="tela%20inicial.html" class="nav-brand"><i class="fa-solid fa-book"></i><span>Biblioteca</span></a>
    <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links">
      <a href="tela%20inicial.html"><i class="fa-solid fa-house"></i> Inicio</a>
      <a href="livros.html"><i class="fa-solid fa-book-open"></i> Livros</a>
      <a href="categorias.html"><i class="fa-solid fa-layer-group"></i> Categorias</a>
      <a href="emprestimos.html"><i class="fa-solid fa-book-bookmark"></i> Catalogo</a>
      <a href="usuarios.html"><i class="fa-solid fa-users"></i> Usuarios</a>
      <a href="reservas.html"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
      <a href="atrasados.html" class="active"><i class="fa-solid fa-triangle-exclamation"></i> Atrasados</a>
      <a href="configuracoes.html"><i class="fa-solid fa-gear"></i> Config</a>
    </ul>
    <div class="nav-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1><i class="fa-solid fa-triangle-exclamation"></i> Emprestimos Atrasados</h1>
    </div>
    <p style="color:#888;margin-bottom:20px;">Livros com prazo de devolucao vencido (acima de 14 dias)</p>
    <div class="table-container">
      <table>
        <thead>
          <tr><th>Livro</th><th>Autor</th><th>Usuario</th><th>Data Emprestimo</th><th>Dias em Atraso</th></tr>
        </thead>
        <tbody id="atrasadosTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (usuario.nome) document.getElementById('userName').textContent = usuario.nome;
    function sair() { sessionStorage.clear(); window.location.href = 'bibliotecaa.html'; }

    async function carregar() {
      try {
        const r = await fetch('/api/atrasados');
        if (!r.ok) throw Error();
        const atrasados = await r.json();
        const tbody = document.getElementById('atrasadosTable');
        if (!atrasados.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#2e7d32;">Nenhum emprestimo atrasado!</td></tr>';
          return;
        }
        tbody.innerHTML = atrasados.map(a => `
          <tr>
            <td><strong>${a.livro}</strong></td>
            <td>${a.autor}</td>
            <td>${a.usuario} (${a.matricula})</td>
            <td>${new Date(a.data_emprestimo+'Z').toLocaleDateString('pt-BR')}</td>
            <td><span class="badge badge-atrasado">${a.dias_atraso} dias</span></td>
          </tr>
        `).join('');
      } catch(e) {
        document.getElementById('atrasadosTable').innerHTML = '<tr><td colspan="5" style="text-align:center;color:#e63946;padding:30px;">Erro ao carregar</td></tr>';
      }
    }
    carregar();
  </script>
</body>
</html>
