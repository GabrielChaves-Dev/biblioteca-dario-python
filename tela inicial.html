<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Escolar</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .hero {
      background: linear-gradient(135deg, #7b2cbf, #5a189a);
      color: white;
      padding: 40px;
      border-radius: 20px;
      margin-bottom: 30px;
      text-align: center;
    }
    .hero h1 { font-size: 28px; margin-bottom: 8px; }
    .hero p { opacity: .8; font-size: 15px; }
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .module-card {
      background: white;
      border-radius: 18px;
      padding: 25px 20px;
      text-decoration: none;
      color: #333;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,.06);
      transition: .3s;
    }
    .module-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,.1); }
    .module-card i { font-size: 32px; margin-bottom: 12px; display: block; }
    .module-card h3 { font-size: 16px; margin-bottom: 4px; }
    .module-card span { font-size: 12px; color: #999; }
    .module-card.color1 i { color: #7b2cbf; }
    .module-card.color2 i { color: #9d4edd; }
    .module-card.color3 i { color: #e63946; }
    .module-card.color4 i { color: #2e7d32; }
    .module-card.color5 i { color: #f57f17; }
    .module-card.color6 i { color: #1565c0; }
    @media (max-width: 480px) {
      .hero { padding: 25px 20px; }
      .hero h1 { font-size: 22px; }
      .modules-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="tela%20inicial.html" class="nav-brand"><i class="fa-solid fa-book"></i><span>Biblioteca</span></a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links">
      <a href="tela%20inicial.html" class="active"><i class="fa-solid fa-house"></i> Inicio</a>
      <a href="livros.html"><i class="fa-solid fa-book-open"></i> Livros</a>
      <a href="categorias.html"><i class="fa-solid fa-layer-group"></i> Categorias</a>
      <a href="emprestimos.html"><i class="fa-solid fa-book-bookmark"></i> Catalogo</a>
      <a href="usuarios.html"><i class="fa-solid fa-users"></i> Usuarios</a>
      <a href="reservas.html"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
      <a href="atrasados.html"><i class="fa-solid fa-triangle-exclamation"></i> Atrasados</a>
      <a href="configuracoes.html"><i class="fa-solid fa-gear"></i> Config</a>
    </ul>
    <div class="nav-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <div class="main-content">
    <div class="hero">
      <h1>Biblioteca Escolar</h1>
      <p>Gerencie seu acervo, emprestimos e usuarios</p>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <h2 style="color:#5a189a; margin-bottom:16px; font-size:18px;">Modulos</h2>
    <div class="modules-grid">
      <a href="livros.html" class="module-card color1">
        <i class="fa-solid fa-book-open"></i>
        <h3>Livros</h3>
        <span id="totalLivros">...</span>
      </a>
      <a href="categorias.html" class="module-card color2">
        <i class="fa-solid fa-layer-group"></i>
        <h3>Categorias</h3>
        <span id="totalCategorias">...</span>
      </a>
      <a href="emprestimos.html" class="module-card color3">
        <i class="fa-solid fa-book-bookmark"></i>
        <h3>Catalogo</h3>
        <span id="totalEmprestimos">...</span>
      </a>
      <a href="usuarios.html" class="module-card color4">
        <i class="fa-solid fa-users"></i>
        <h3>Usuarios</h3>
        <span id="totalUsuarios">...</span>
      </a>
      <a href="reservas.html" class="module-card color5">
        <i class="fa-solid fa-calendar-check"></i>
        <h3>Reservas</h3>
        <span id="totalReservas">...</span>
      </a>
      <a href="atrasados.html" class="module-card color6">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>Atrasados</h3>
        <span id="totalAtrasados">...</span>
      </a>
    </div>
  </div>

  <script>
    const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
    if (usuario.nome) document.getElementById('userName').textContent = usuario.nome;

    function sair() { sessionStorage.clear(); window.location.href = 'bibliotecaa.html'; }

    async function carregar() {
      try {
        const r = await fetch('/api/dashboard');
        if (!r.ok) throw Error();
        const d = await r.json();
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card"><div class="stat-number">${d.total_livros}</div><div class="stat-label">Livros</div></div>
          <div class="stat-card"><div class="stat-number">${d.disponiveis}</div><div class="stat-label">Disponiveis</div></div>
          <div class="stat-card"><div class="stat-number">${d.emprestados}</div><div class="stat-label">Emprestados</div></div>
          <div class="stat-card"><div class="stat-number">${d.emprestimos_ativos}</div><div class="stat-label">Emprestimos Ativos</div></div>
          <div class="stat-card"><div class="stat-number">${d.total_usuarios}</div><div class="stat-label">Usuarios</div></div>
          <div class="stat-card"><div class="stat-number">${d.reservados}</div><div class="stat-label">Reservados</div></div>
        `;
        document.getElementById('totalLivros').textContent = d.total_livros + ' livros';
        document.getElementById('totalCategorias').textContent = d.total_categorias + ' cat.';
        document.getElementById('totalEmprestimos').textContent = d.emprestimos_ativos + ' ativos';
        document.getElementById('totalUsuarios').textContent = d.total_usuarios + ' usuarios';
        document.getElementById('totalReservas').textContent = d.reservados + ' reservas';
      } catch(e) {}
      try {
        const r2 = await fetch('/api/atrasados');
        if (!r2.ok) throw Error();
        const a = await r2.json();
        document.getElementById('totalAtrasados').textContent = a.length + ' atrasados';
      } catch(e) {}
    }
    carregar();
  </script>
</body>
</html>
